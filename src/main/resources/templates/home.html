<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OAuth 학습 데모</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 22px; }
        p.desc { color: #666; line-height: 1.6; }
        .btn { display: block; padding: 14px; margin: 12px 0; border-radius: 8px; text-align: center;
               text-decoration: none; color: #fff; font-weight: 600; }
        .google { background: #4285F4; }
        .kakao  { background: #FEE500; color: #000; }
        .github { background: #24292F; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>OAuth 2.0 로그인 데모</h1>
    <p class="desc">
        버튼을 누르면 <code>/oauth/{provider}/login</code> 으로 이동하고,
        서버가 <b>state를 만들어 세션에 저장</b>한 뒤 제공자 로그인 화면으로 <b>302 리다이렉트</b>합니다.
    </p>

    <!-- 각 버튼 = 우리 서버의 로그인 시작 주소. 여기서부터 OAuth 흐름이 시작된다. -->
    <a class="btn google" href="/oauth/google/login">Google 로그인</a>
    <a class="btn kakao"  href="/oauth/kakao/login">Kakao 로그인</a>
    <a class="btn github" href="/oauth/github/login">GitHub 로그인</a>
</body>
</html>
